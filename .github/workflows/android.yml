name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-

    - name: Build Release APKs
      working-directory: Android/src
      run: ./gradlew assembleRelease --no-daemon

    - name: Sign APKs manually
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        ALIAS: ${{ secrets.ALIAS }}
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        # Decode the keystore from the secret to a temporary file
        echo "$SIGNING_KEY" | base64 -d > signingKey.pfx
        
        BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/35.0.0"
        
        echo "=== Signing Release APKs ==="
        for apk in Android/src/app/build/outputs/apk/release/*-release.apk; do
          if [ -f "$apk" ]; then
            echo "Signing $apk..."
            
            # Verify alignment first, or align if necessary
            if "$BUILD_TOOLS_DIR/zipalign" -c 4 "$apk"; then
              echo "$apk is already aligned."
              aligned_apk="$apk"
            else
              echo "Aligning $apk..."
              aligned_apk="${apk%.apk}-aligned.apk"
              "$BUILD_TOOLS_DIR/zipalign" -f 4 "$apk" "$aligned_apk"
            fi
            
            # Sign the aligned APK and produce a -signed.apk file
            signed_apk="${apk%-release.apk}-signed.apk"
            "$BUILD_TOOLS_DIR/apksigner" sign \
              --ks signingKey.pfx \
              --ks-type PKCS12 \
              --ks-key-alias "$ALIAS" \
              --ks-pass pass:"$KEY_STORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out "$signed_apk" \
              "$aligned_apk"
              
            # Verify the signed APK
            "$BUILD_TOOLS_DIR/apksigner" verify "$signed_apk"
            
            # Clean up the unsigned / intermediate files
            rm -f "$apk"
            if [ "$aligned_apk" != "$apk" ]; then
              rm -f "$aligned_apk"
            fi
          fi
        done
        
        # Clean up keystore file
        rm -f signingKey.pfx

    - name: List built APKs
      run: |
        echo "=== All APKs ==="
        find Android/src/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

    - name: Upload all APKs
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: Android/src/app/build/outputs/apk/release/*.apk

    # Create GitHub Release when a v* tag is pushed
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Android/src/app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
